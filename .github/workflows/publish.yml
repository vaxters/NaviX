name: Publish to Maven Central

# Triggers:
#   • Pushing a version tag (e.g. v1.0.0) kicks off an automatic release.
#   • workflow_dispatch lets you trigger a release manually from the Actions UI.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # also matches pre-release tags like v0.1.0-alpha01
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Publish to local Maven (~/.m2) instead of Maven Central'
        type: boolean
        default: false
      version:
        description: 'Version to release (e.g. 1.0.0) — leave empty to use gradle.properties'
        type: string
        required: false

# Only one publish job may run at a time for a given ref.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish all modules
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write   # needed to create GitHub Releases and push to master

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required by git-cliff

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      # -----------------------------------------------------------------------
      # Guard: fail fast if the tag does not point to a commit that is part of
      # master. Prevents accidental (or malicious) releases from feature branches.
      # -----------------------------------------------------------------------
      - name: Verify tag is on master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor HEAD origin/master; then
            echo "::error::Tag must point to a commit that is reachable from master."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Derive the release version from the pushed tag so gradle.properties
      # never needs to be manually bumped before tagging.
      #
      # Priority:
      #   1. Tag name (v1.0.0 → 1.0.0)          — normal tag-push release
      #   2. workflow_dispatch `version` input   — manual override
      #   3. Current gradle.properties value     — workflow_dispatch fallback
      # -----------------------------------------------------------------------
      - name: Derive version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep "^VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          fi
          if [[ "$VERSION" == *"-SNAPSHOT"* ]]; then
            echo "::error::Version '$VERSION' is a SNAPSHOT — not a valid release version."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Overwrite VERSION_NAME in gradle.properties with the tag-derived version
      # so all Gradle publish tasks use the correct coordinate without any
      # manual file edits before tagging.
      # -----------------------------------------------------------------------
      - name: Sync VERSION_NAME in gradle.properties
        run: |
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=${VERSION}/" gradle.properties
          grep "^VERSION_NAME=" gradle.properties

      # -----------------------------------------------------------------------
      # Install git-cliff from a pinned binary release (statically linked musl
      # build — no libc dependency, works on any ubuntu-latest runner).
      # -----------------------------------------------------------------------
      - name: Install git-cliff v2.8.0
        if: ${{ inputs.dry_run != true }}
        run: |
          CLIFF_VERSION="2.8.0"
          curl -fsSL \
            "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            -o git-cliff.tar.gz
          tar -xzf git-cliff.tar.gz
          CLIFF_BIN=$(find . -maxdepth 3 -name "git-cliff" -type f | head -1)
          chmod +x "$CLIFF_BIN"
          sudo mv "$CLIFF_BIN" /usr/local/bin/git-cliff
          git-cliff --version

      # -----------------------------------------------------------------------
      # Generate the changelog entry for this release from conventional commits.
      #
      # Run 1 — body only (--strip all removes header/footer) → release-notes.md
      #          used as the GitHub Release body.
      # Run 2 — full entry prepended into CHANGELOG.md so the file stays current.
      # -----------------------------------------------------------------------
      - name: Generate release notes with git-cliff
        if: ${{ inputs.dry_run != true }}
        run: |
          git cliff --unreleased --tag "v${VERSION}" --strip all \
            --output release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::warning::git-cliff produced an empty changelog — no conventional commits found since last tag."
            echo "_No conventional commits found for v${VERSION}._" > release-notes.md
          fi

          git cliff --unreleased --tag "v${VERSION}" --prepend CHANGELOG.md

      # -----------------------------------------------------------------------
      # Local dry-run: publish to ~/.m2 so the artifacts can be inspected
      # without touching Maven Central. Triggered via workflow_dispatch.
      # -----------------------------------------------------------------------
      - name: Publish to local Maven (dry run)
        if: ${{ inputs.dry_run == true }}
        run: ./gradlew publishToMavenLocal
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      # -----------------------------------------------------------------------
      # Real publish: upload all publications and trigger an automatic release
      # on Sonatype Central Portal.
      # -----------------------------------------------------------------------
      - name: Publish to Maven Central
        if: ${{ inputs.dry_run != true }}
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      # -----------------------------------------------------------------------
      # Convenience: print the exact coordinates that were published so they
      # appear in the workflow summary for copy-paste into release notes.
      # -----------------------------------------------------------------------
      - name: Print published coordinates
        if: ${{ inputs.dry_run != true }}
        run: |
          echo "## Published artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for artifact in navix-contracts navix-annotations navix-runtime navix-compiler navix-telemetry navix-devtools navix-testing; do
            echo "- \`io.github.vaxters:${artifact}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          done

      # -----------------------------------------------------------------------
      # Commit gradle.properties (bumped version) and CHANGELOG.md together
      # in one atomic commit to master — only after a successful publish so
      # master never gets a stale update if publishing fails mid-way.
      # Workflow checks out a detached HEAD (tag), so push explicitly to master.
      # [skip ci] prevents the CI workflow from looping on this commit.
      # -----------------------------------------------------------------------
      - name: Commit version bump and changelog to master
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties CHANGELOG.md
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore(release): bump to v${VERSION} and update CHANGELOG.md [skip ci]"
            git push origin HEAD:master
          fi

      # -----------------------------------------------------------------------
      # Build the demo app APK (debug — uses default Android debug keystore,
      # no signing secrets required). Rename to include the version number.
      # -----------------------------------------------------------------------
      - name: Build demo APK
        if: ${{ inputs.dry_run != true }}
        run: |
          ./gradlew :navix-demo-app:assembleDebug
          APK_SRC="navix-demo-app/build/outputs/apk/debug/navix-demo-app-debug.apk"
          APK_DST="navix-demo-v${VERSION}.apk"
          cp "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Create a GitHub Release tagged at the current commit, with the
      # git-cliff-generated changelog as the release body and the demo APK
      # as a downloadable asset.
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: ${{ inputs.dry_run != true }}
        run: |
          gh release create "v${VERSION}" \
            --title "Navix v${VERSION}" \
            --notes-file release-notes.md \
            "${APK_PATH}#Demo App (debug APK)"
        env:
          GH_TOKEN: ${{ github.token }}
