name: Publish to Maven Central

# Triggers:
#   • Pushing a version tag (e.g. v0.1.0) kicks off an automatic release.
#   • workflow_dispatch lets you trigger a release manually from the Actions UI.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # also matches pre-release tags like v0.1.0-alpha01
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Publish to local Maven (~/.m2) instead of Maven Central'
        type: boolean
        default: false

# Only one publish job may run at a time for a given ref.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish all modules
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for version inference

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      # -----------------------------------------------------------------------
      # Guard: fail fast if the version still carries a -SNAPSHOT suffix.
      # Also exports VERSION to the environment for all subsequent steps.
      # -----------------------------------------------------------------------
      - name: Validate release version
        run: |
          VERSION=$(grep "^VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          if [[ "$VERSION" == *"-SNAPSHOT"* ]]; then
            echo "::error::VERSION_NAME is '$VERSION' — remove the -SNAPSHOT suffix before tagging."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Local dry-run: publish to ~/.m2 so the artifacts can be inspected
      # without touching Maven Central. Triggered via workflow_dispatch.
      # -----------------------------------------------------------------------
      - name: Publish to local Maven (dry run)
        if: ${{ inputs.dry_run == true }}
        run: ./gradlew publishToMavenLocal
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      # -----------------------------------------------------------------------
      # Real publish: upload all publications and trigger an automatic release
      # on Sonatype Central Portal.
      # -----------------------------------------------------------------------
      - name: Publish to Maven Central
        if: ${{ inputs.dry_run != true }}
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      # -----------------------------------------------------------------------
      # Convenience: print the exact coordinates that were published so they
      # appear in the workflow summary for copy-paste into release notes.
      # -----------------------------------------------------------------------
      - name: Print published coordinates
        if: ${{ inputs.dry_run != true }}
        run: |
          echo "## Published artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for artifact in navix-contracts navix-annotations navix-runtime navix-compiler navix-telemetry navix-devtools navix-testing; do
            echo "- \`io.navix:${artifact}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          done

      # -----------------------------------------------------------------------
      # Extract the changelog section for this version from CHANGELOG.md.
      # Falls back to a placeholder if the section hasn't been written yet.
      # -----------------------------------------------------------------------
      - name: Extract release notes from CHANGELOG.md
        if: ${{ inputs.dry_run != true }}
        run: |
          chmod +x .github/scripts/extract-changelog.sh
          .github/scripts/extract-changelog.sh "$VERSION" > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "_No changelog entry found for v${VERSION}. See CHANGELOG.md._" > release-notes.md
          fi

      # -----------------------------------------------------------------------
      # Create a GitHub Release tagged at the current commit, attaching the
      # extracted changelog section as the release body.
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: ${{ inputs.dry_run != true }}
        run: |
          gh release create "v${VERSION}" \
            --title "Navix v${VERSION}" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
