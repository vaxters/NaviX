name: CI

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master
    workflow_dispatch:

permissions:
    contents: read
    security-events: write

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    android-lint:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            -   name: Checkout
                uses: actions/checkout@v7

            -   name: Setup JDK
                uses: actions/setup-java@v5
                with:
                    distribution: temurin
                    java-version: 17
                    cache: gradle

            -   name: Setup Android SDK
                uses: android-actions/setup-android@v4

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v6

            -   name: Grant execute permission
                run: chmod +x gradlew

            -   name: Run Android Lint
                run: ./gradlew lint
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: [ android-lint ]
        steps:
            -   name: Checkout
                uses: actions/checkout@v7

            -   name: Setup JDK
                uses: actions/setup-java@v5
                with:
                    distribution: temurin
                    java-version: 17
                    cache: gradle

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v6

            -   name: Grant execute permission
                run: chmod +x gradlew

            -   name: Run Unit Tests
                run: ./gradlew test

    build:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: [ test ]
        steps:
            -   name: Checkout
                uses: actions/checkout@v7

            -   name: Setup JDK
                uses: actions/setup-java@v5
                with:
                    distribution: temurin
                    java-version: 17
                    cache: gradle

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v6

            -   name: Grant execute permission
                run: chmod +x gradlew

            -   name: Assemble Debug
                run: ./gradlew assembleDebug
