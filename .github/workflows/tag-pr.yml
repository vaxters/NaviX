name: Annotate PR on version tag

on:
  # Job `annotate-pr`: fires when a version tag is pushed.
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  # Job `stale-tag-warning`: fires when new commits are pushed to a PR branch.
  pull_request:
    types: [synchronize]

jobs:

  # ---------------------------------------------------------------------------
  # When a version tag is pushed: find the open PR that contains the tagged
  # commit, prefix its title with Release[x.y.z] and add a red label.
  # ---------------------------------------------------------------------------
  annotate-pr:
    name: Label and rename release PR
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      # Find the open PR whose HEAD commit matches the pushed tag.
      # Uses the GitHub API endpoint that returns PRs associated with a commit,
      # filtered to only open ones so merged/closed PRs are never touched.
      - name: Find open PR for this tag
        id: find-pr
        run: |
          PR_NUMBER=$(gh api \
            repos/${{ github.repository }}/commits/${{ github.sha }}/pulls \
            --jq '[.[] | select(.state == "open")] | .[0].number // empty')

          if [[ -z "$PR_NUMBER" ]]; then
            echo "No open PR found for commit ${{ github.sha }} — skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true"   >> "$GITHUB_OUTPUT"
            echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # Create the label if it does not exist yet. The `|| true` silently
      # ignores the error when the label already exists.
      - name: Ensure release label exists
        if: steps.find-pr.outputs.found == 'true'
        run: |
          gh label create "release" \
            --color "B60205" \
            --description "This PR prepares a release" \
            --repo "${{ github.repository }}" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      # Fetch the current PR title fresh (avoids output-escaping issues with
      # special characters), prepend the Release[x.y.z] prefix, and add the
      # label. Re-tagging the same PR with a different version replaces the
      # old prefix cleanly instead of nesting it.
      - name: Update PR title and add label
        if: steps.find-pr.outputs.found == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PR_NUMBER="${{ steps.find-pr.outputs.number }}"

          ORIGINAL=$(gh pr view "${PR_NUMBER}" --json title --jq '.title')

          # Replace existing Release[...] prefix instead of double-prefixing
          if [[ "$ORIGINAL" =~ ^Release\[.*\]:\ .* ]]; then
            NEW_TITLE="Release[${VERSION}]: ${ORIGINAL#*]: }"
          else
            NEW_TITLE="Release[${VERSION}]: ${ORIGINAL}"
          fi

          gh pr edit "${PR_NUMBER}" \
            --title "${NEW_TITLE}" \
            --add-label "release"

          echo "PR #${PR_NUMBER} → ${NEW_TITLE}"
        env:
          GH_TOKEN: ${{ github.token }}

  # ---------------------------------------------------------------------------
  # When new commits are pushed to a PR that already has the release label:
  # the existing tag now points to an older commit and is stale. Strip the
  # Release[...] prefix from the title, remove the label, and post a comment
  # so the author knows they need to re-tag before merging.
  # ---------------------------------------------------------------------------
  stale-tag-warning:
    name: Warn if commits added after release tag
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check for release label
        id: check
        run: |
          HAS_LABEL=$(gh pr view "${{ github.event.pull_request.number }}" \
            --json labels \
            --jq '[.labels[].name] | contains(["release"])' \
            --repo "${{ github.repository }}")
          echo "has_release_label=${HAS_LABEL}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      # Only runs when the PR had a release label — i.e. a tag was pushed
      # previously but now the branch has moved on past that tagged commit.
      - name: Strip release annotation and post warning comment
        if: steps.check.outputs.has_release_label == 'true'
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          CURRENT=$(gh pr view "${PR_NUMBER}" --json title --jq '.title')

          # Remove the Release[...] prefix if present
          if [[ "$CURRENT" =~ ^Release\[.*\]:\ .* ]]; then
            CLEAN="${CURRENT#*]: }"
            gh pr edit "${PR_NUMBER}" --title "${CLEAN}"
          fi

          gh pr edit "${PR_NUMBER}" --remove-label "release"

          gh pr comment "${PR_NUMBER}" --body \
            "⚠️ **New commits were added after the release tag.**

The \`release\` label and title prefix have been removed because the tag now points to an older commit — these new changes **will not** be included in the release.

If you want the latest commits included, push a new tag from the current branch HEAD before merging."
        env:
          GH_TOKEN: ${{ github.token }}
