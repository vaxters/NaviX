# Navix detekt configuration
# Extends the built-in default config (buildUponDefaultConfig = true in build.gradle.kts).
# A shared baseline at config/detekt/baseline.xml suppresses pre-existing violations.
# Only new code introduced going forward must comply with all active rules.

build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

# ── Complexity ──────────────────────────────────────────────────────────────
complexity:
  active: true
  CyclomaticComplexMethod:
    # NavixHost and the actor's processAction have intentionally higher cyclomatic
    # complexity; use the baseline for those. The threshold is raised from the
    # default (10) to avoid false positives on legitimate switch-heavy reducers.
    threshold: 20
  LongParameterList:
    # Library constructors often expose optional named parameters for DI / testing.
    functionThreshold: 8
    constructorThreshold: 8
  LongMethod:
    # NavixHost composable is legitimately long; baselined. Raise threshold slightly
    # to reduce noise on similarly justified methods.
    threshold: 80
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 20
    thresholdInInterfaces: 15

# ── Coroutines ───────────────────────────────────────────────────────────────
coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true
  SuspendFunSwallowedCancellation:
    active: true

# ── Style ────────────────────────────────────────────────────────────────────
style:
  active: true
  ForbiddenComment:
    # TODO comments in the publishing POM block are accepted placeholders.
    active: false
  MagicNumber:
    # Compose animation specs, timeouts, and buffer sizes are numeric by nature.
    active: false
  WildcardImport:
    active: true
  UnusedPrivateMember:
    active: true
  ReturnCount:
    max: 4  # deep-link handlers have multiple return null paths

# ── Naming ───────────────────────────────────────────────────────────────────
naming:
  active: true

# ── Exceptions ───────────────────────────────────────────────────────────────
exceptions:
  active: true
  TooGenericExceptionCaught:
    # processAction and exporter loops intentionally catch Throwable to prevent
    # actor stalls from bad implementations. These are baselined.
    active: true
  SwallowedException:
    active: true
