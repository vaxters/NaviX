# Navix detekt configuration
# Extends the built-in default config (buildUponDefaultConfig = true in build.gradle.kts).

build:
    maxIssues: 0

config:
    validation: true
    warningsAsErrors: false

# ── Complexity ──────────────────────────────────────────────────────────────
complexity:
    active: true
    CyclomaticComplexMethod:
        # Threshold raised from default 10 to reduce false positives on switch-heavy reducers.
        threshold: 20
        # Composables orchestrate navigation, transitions, back handling, and lifecycle —
        # their cyclomatic complexity is inherently higher than regular imperative code.
        # Same targeted annotation exclusion used for FunctionNaming.
        ignoreAnnotated:
            - Composable
    LongParameterList:
        # Library constructors often expose optional named parameters for DI / testing.
        functionThreshold: 8
        constructorThreshold: 8
    LongMethod:
        # Threshold raised slightly to reduce noise on justified methods.
        threshold: 120
        # Composables are declaratively long by nature: nested slot lambdas, preview
        # parameters, and conditional layout branches inflate line counts without
        # indicating real structural complexity. Every LongMethod violation in the
        # former baselines was on a @Composable function.
        ignoreAnnotated:
            - Composable
    TooManyFunctions:
        thresholdInFiles: 30
        thresholdInClasses: 20
        thresholdInInterfaces: 15

# ── Coroutines ───────────────────────────────────────────────────────────────
coroutines:
    active: true
    GlobalCoroutineUsage:
        active: true
    RedundantSuspendModifier:
        active: true
    SuspendFunSwallowedCancellation:
        active: true

# ── Style ────────────────────────────────────────────────────────────────────
style:
    active: true
    ForbiddenComment:
        # TODO comments in the publishing POM block are accepted placeholders.
        active: false
    MagicNumber:
        # Compose animation specs, timeouts, and buffer sizes are numeric by nature.
        active: false
    WildcardImport:
        active: true
    UnusedPrivateMember:
        active: true
    ReturnCount:
        max: 4  # deep-link handlers have multiple return null paths

# ── Naming ───────────────────────────────────────────────────────────────────
naming:
    active: true
    FunctionNaming:
        active: true
        # Jetpack Compose mandates PascalCase for @Composable functions that emit UI
        # (return Unit). This is the official Compose API guideline and recognised by
        # the Android Studio IDE. Detekt's default pattern (camelCase) predates Compose
        # and produces false positives for every screen, component, and preview composable.
        # Ignoring @Composable is the correct, targeted fix — not a blanket suppression.
        # Both the simple name and FQN are listed to cover detekt's annotation matching
        # in both non-type-resolution and type-resolution modes.
        ignoreAnnotated:
            - 'Composable'
            - 'androidx.compose.runtime.Composable'
        # DemoTheme.kt: NavixDemoTheme is a @Composable theme wrapper. Detekt 1.23.x
        # has a known gap where ignoreAnnotated is not applied when a parameter type
        # also carries @Composable (e.g. `content: @Composable () -> Unit`). Excluding
        # this single demo-app file is the targeted workaround.
        # Test source sets also excluded: JUnit test functions conventionally use
        # underscores (methodName_condition_outcome) which violates the default
        # camelCase pattern. This is an accepted testing idiom.
        excludes: [ '**/test/**', '**/navix-demo-app/**/DemoTheme.kt' ]

# ── Exceptions ───────────────────────────────────────────────────────────────
exceptions:
    active: true
    TooGenericExceptionCaught:
        active: true
    SwallowedException:
        active: true
